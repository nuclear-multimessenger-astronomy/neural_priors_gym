# Example config for training a neural prior on NSBH source-frame masses
# with a uniform NS mass distribution and chiEFT EOS samples.
#
# The primary (m1) is the black hole, sampled uniformly above MTOV up to
# m_max_bh. The secondary (m2) is the neutron star, sampled uniformly in
# [m_min, MTOV]. Only lambda_2 (the NS tidal deformability) is included;
# the BH has no tidal deformability.
#
# Usage: neural_priors_gym_train config.yaml

output_dir: ./outdir

source_type: nsbh

# Upper bound on the BH mass in solar masses. Must exceed the MTOV of all
# EOS samples in the provided file.
m_max_bh: 5.0

masses:
  type: uniform
  parameter_names:
    - mass_1_source
    - mass_2_source
  m_min: 1.0

lambdas:
  parameter_names:
    - lambda_2
  # Point this to your EOS npz file (must contain masses_EOS and Lambdas_EOS)
  eos_path: ../../jester/examples/inference/smc_random_walk/chiEFT/eos_samples.npz

flow:
  backend: glasflow
  n_transforms: 4
  n_neurons: 256
  n_blocks_per_transform: 3
  num_bins: 8
  tail_bound: 5.0
  activation: relu
  linear_transform: none
  dropout_probability: 0.0
  batch_norm_within_blocks: false
  batch_norm_between_transforms: false

training:
  n_samples: 200000
  num_epochs: 500
  learning_rate: 0.0001
  batch_size: 1024
  max_patience: 100
  validation_split: 0.2
  scale_input: true
