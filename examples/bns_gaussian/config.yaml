# Example config for training a neural prior on BNS source-frame masses
# with a single Gaussian mass distribution and chiEFT EOS samples.
#
# The flow is trained on chirp_mass_source and mass_ratio rather than
# component masses, which is more natural for use in bilby inference.
# Component masses are always generated internally; training.parameter_names
# selects which quantities enter the flow.
#
# Population hyperparameters are taken from arXiv:2407.16669.
#
# Usage: neural_priors_gym_train config.yaml

output_dir: ./outdir
generate_only: true

source_type: bns

masses:
  type: gaussian
  m_min: 1.0
  mean: 1.33
  std: 0.07

lambdas:
  # Point this to your EOS npz file (must contain masses_EOS and Lambdas_EOS)
  eos_path: ../../eos_samples.npz

flow:
  backend: glasflow
  n_transforms: 4
  n_neurons: 256
  n_blocks_per_transform: 3
  num_bins: 8
  tail_bound: 5.0
  activation: relu
  linear_transform: none
  dropout_probability: 0.0
  batch_norm_within_blocks: false
  batch_norm_between_transforms: false

training:
  # Train on chirp mass and mass ratio instead of component masses.
  # Use [mass_1_source, mass_2_source, lambda_1, lambda_2] for component masses.
  parameter_names:
    - chirp_mass_source
    - mass_ratio
    - lambda_1
    - lambda_2
  n_samples: 200000
  num_epochs: 500
  learning_rate: 0.0001
  batch_size: 1024
  max_patience: 100
  validation_split: 0.2
  scale_input: true
